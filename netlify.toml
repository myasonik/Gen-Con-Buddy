[build]
command = "vite build"
publish = "dist"

[[redirects]]
from = "/api/*"
to = "https://web-production-e0d43.up.railway.app/api/:splat"
status = 200
force = true

[[redirects]]
from = "/ingest/static/*"
to = "https://us-assets.i.posthog.com/static/:splat"
status = 200
force = true

[[redirects]]
from = "/ingest/*"
to = "https://us.i.posthog.com/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
