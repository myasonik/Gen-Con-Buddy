<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gen Con Buddy</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Courier+Prime&family=Source+Sans+3:wght@400;600&family=Zilla+Slab:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("gcb-theme");
          var parsed = stored ? JSON.parse(stored) : null;
          var pref = parsed && parsed.version === 1 ? parsed.value : "auto";
          var resolved =
            pref === "auto"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : pref;
          document.documentElement.setAttribute("data-theme", resolved);
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="live-polite" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="live-assertive" aria-live="assertive" aria-atomic="true" class="sr-only"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
